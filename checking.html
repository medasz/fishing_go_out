<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>安全检测中 - 钓鱼拦截</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft YaHei", sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .checking-container {
      max-width: 600px;
      width: 100%;
      padding: 48px 32px;
      text-align: center;
    }
    .checking-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: rgba(88, 166, 255, 0.12);
      border: 3px solid #58a6ff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(88, 166, 255, 0.4); }
      50% { box-shadow: 0 0 0 18px rgba(88, 166, 255, 0); }
    }
    .checking-title {
      font-size: 28px;
      font-weight: 700;
      color: #58a6ff;
      margin-bottom: 12px;
    }
    .checking-subtitle {
      font-size: 16px;
      color: #8b949e;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .checking-info {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 32px;
      text-align: left;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #21262d;
      font-size: 14px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: #8b949e; flex-shrink: 0; margin-right: 16px; }
    .info-value { color: #c9d1d9; text-align: right; word-break: break-all; }
    .info-value.threat { color: #da3633; font-weight: 600; }
    .info-value.source { color: #58a6ff; }
    .checking-desc {
      margin-top: 12px;
      padding: 12px;
      background: rgba(240, 136, 62, 0.06);
      border-left: 3px solid #f0883e;
      border-radius: 0 6px 6px 0;
      font-size: 13px;
      color: #f0883e;
      line-height: 1.6;
      text-align: left;
    }
    .checking-actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      padding: 14px 28px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      text-decoration: none;
    }
    .btn-back {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
    }
    .btn-back:hover {
      background: #30363d;
      transform: translateY(-1px);
    }
    .btn-proceed {
      background: #da3633;
      color: white;
    }
    .btn-proceed:hover {
      background: #f85149;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(218, 54, 51, 0.4);
    }
    .btn-proceed:disabled {
      background: #30363d;
      color: #484f58;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }
    .btn-skip {
      background: #30363d;
      color: #c9d1d9;
      border: 1px solid #484f58;
    }
    .btn-skip:hover {
      background: #484f58;
      transform: translateY(-1px);
    }
    .btn-skip:disabled {
      color: #484f58;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }
    .checking-hint {
      margin-top: 24px;
      font-size: 12px;
      color: #484f58;
      line-height: 1.5;
    }
    .checking-footer {
      margin-top: 48px;
      font-size: 12px;
      color: #484f58;
    }
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      display: inline-block;
      vertical-align: -3px;
      margin-right: 8px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="checking-container">
    <div class="checking-icon">🛡️</div>

    <!-- 检测中状态 -->
    <div id="state-loading">
      <h1 class="checking-title">安全检测中…</h1>
      <p class="checking-subtitle">
        正在核查目标网站的威胁情报，<br>确认安全前不会加载任何页面内容。
      </p>
      <div class="checking-actions" style="margin-top:8px;">
        <button class="btn btn-skip" id="btn-skip">跳过检测，直接访问</button>
      </div>
    </div>

    <!-- 安全状态 -->
    <div id="state-safe" class="hidden">
      <h1 class="checking-title" style="color:#3fb950;">✓ 未检测到威胁</h1>
      <p class="checking-subtitle">该网站未出现在威胁情报库中，即将为您跳转。</p>
    </div>

    <!-- 威胁状态 -->
    <div id="state-threat" class="hidden">
      <h1 class="checking-title" style="color:#da3633;">⚠️ 发现安全威胁</h1>
      <p class="checking-subtitle">
        该网站可能包含 <strong style="color:#da3633;">恶意内容</strong>，<br>建议不要继续访问。
      </p>
    </div>

    <div class="checking-info" id="info-panel">
      <div class="info-row"><span class="info-label">目标域名</span><span class="info-value" id="info-domain">-</span></div>
      <div class="info-row"><span class="info-label">威胁类型</span><span class="info-value threat" id="info-type">-</span></div>
      <div class="info-row"><span class="info-label">情报来源</span><span class="info-value source" id="info-source">-</span></div>
      <div class="info-row"><span class="info-label">目标URL</span><span class="info-value" id="info-url">-</span></div>
      <div class="checking-desc" id="info-desc" style="display:none;"></div>
    </div>

    <div class="checking-actions">
      <button class="btn btn-back" id="btn-back">返回安全页面</button>
      <button class="btn btn-proceed" id="btn-proceed" disabled>
        <span class="spinner" id="proceed-spinner"></span>仍要访问
      </button>
    </div>

    <p class="checking-hint">
      在检测结果出来之前，目标网站的内容没有被加载，您的浏览器数据是安全的。<br>
      若您确认网站合法，可点击“仍要访问”直接跳转。
    </p>

    <div class="checking-footer">
      钓鱼拦截扩展 · 数据来源: VirusTotal / 微步 ThreatBook / URLhaus / PhishTank / AlienVault OTX
    </div>
  </div>

  <script src="checking.js"></script>
</body>
</html>
