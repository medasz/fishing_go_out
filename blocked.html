<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>安全告警 - 访问已拦截</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft YaHei", sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .blocked-container {
      max-width: 600px;
      width: 100%;
      padding: 48px 32px;
      text-align: center;
    }
    .blocked-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: rgba(218, 54, 51, 0.15);
      border: 3px solid #da3633;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(218, 54, 51, 0.4); }
      50% { box-shadow: 0 0 0 18px rgba(218, 54, 51, 0); }
    }
    .blocked-title {
      font-size: 28px;
      font-weight: 700;
      color: #da3633;
      margin-bottom: 12px;
    }
    .blocked-subtitle {
      font-size: 16px;
      color: #8b949e;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .blocked-info {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 32px;
      text-align: left;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #21262d;
      font-size: 14px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: #8b949e; flex-shrink: 0; margin-right: 16px; }
    .info-value { color: #c9d1d9; text-align: right; word-break: break-all; }
    .info-value.threat { color: #da3633; font-weight: 600; }
    .info-value.source { color: #58a6ff; }
    .blocked-desc {
      margin-top: 12px;
      padding: 12px;
      background: rgba(218, 54, 51, 0.06);
      border-left: 3px solid #da3633;
      border-radius: 0 6px 6px 0;
      font-size: 13px;
      color: #f0883e;
      line-height: 1.6;
      text-align: left;
    }
    .blocked-actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      padding: 14px 28px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      text-decoration: none;
    }
    .btn-back {
      background: #238636;
      color: white;
    }
    .btn-back:hover {
      background: #2ea043;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(35, 134, 54, 0.4);
    }
    .btn-proceed {
      background: #da3633;
      color: white;
    }
    .btn-proceed:hover {
      background: #f85149;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(218, 54, 51, 0.4);
    }
    .blocked-hint {
      margin-top: 24px;
      font-size: 12px;
      color: #484f58;
      line-height: 1.5;
    }
    .blocked-footer {
      margin-top: 48px;
      font-size: 12px;
      color: #484f58;
    }
    .loading-text { color: #8b949e; font-size: 16px; }
  </style>
</head>
<body>
  <div class="blocked-container">
    <div class="blocked-icon">⚠️</div>
    <h1 class="blocked-title">访问已拦截 - 发现安全威胁</h1>
    <p class="blocked-subtitle" id="subtitle">
      该网站可能包含恶意内容，已被钓鱼拦截扩展阻止。<br>请确认风险后再决定是否继续。
    </p>

    <div class="blocked-info" id="info-panel">
      <div class="info-row"><span class="info-label">目标域名</span><span class="info-value threat" id="info-domain">加载中...</span></div>
      <div class="info-row"><span class="info-label">威胁类型</span><span class="info-value threat" id="info-type">-</span></div>
      <div class="info-row"><span class="info-label">情报来源</span><span class="info-value source" id="info-source">-</span></div>
      <div class="info-row"><span class="info-label">目标URL</span><span class="info-value" id="info-url">-</span></div>
      <div class="blocked-desc" id="info-desc" style="display:none;"></div>
    </div>

    <div class="blocked-actions">
      <button class="btn btn-back" id="btn-back">返回安全页面</button>
      <button class="btn btn-proceed" id="btn-proceed">我了解风险，继续访问</button>
    </div>

    <p class="blocked-hint">
      继续访问前请确认目标网站的合法性。<br>
      该网站在加载任何内容前已被拦截，您的浏览器数据是安全的。
    </p>

    <div class="blocked-footer">
      钓鱼拦截扩展 · 数据来源: VirusTotal / 微步 ThreatBook / URLhaus / PhishTank / AlienVault OTX
    </div>
  </div>

  <script src="blocked.js"></script>
</body>
</html>
