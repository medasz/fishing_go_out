<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>钓鱼拦截</title>
  <link rel="stylesheet" href="styles/popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- 头部 -->
    <header class="popup-header">
      <div class="header-logo">
        <span class="logo-icon">🛡️</span>
        <h1>钓鱼拦截</h1>
      </div>
      <span class="version">v1.0</span>
    </header>

    <!-- 统计面板 -->
    <section class="stats-panel">
      <div class="stat-card">
        <div class="stat-number" id="stat-total">0</div>
        <div class="stat-label">检测域名</div>
      </div>
      <div class="stat-card stat-safe">
        <div class="stat-number" id="stat-safe">0</div>
        <div class="stat-label">安全</div>
      </div>
      <div class="stat-card stat-threat">
        <div class="stat-number" id="stat-threat">0</div>
        <div class="stat-label">威胁</div>
      </div>
    </section>

    <!-- 当前页面状态 -->
    <section class="current-page">
      <div class="section-title">当前页面</div>
      <div class="current-domain" id="current-domain">加载中...</div>
      <div class="current-status" id="current-status">
        <span class="status-dot"></span>
        <span class="status-text">检测中...</span>
      </div>
    </section>

    <!-- 白名单管理 -->
    <section class="whitelist">
      <details class="settings-details" id="whitelist-details" open>
        <summary class="settings-summary">⭐ 我的白名单（免检测）</summary>
        <div class="settings-body">
          <div class="whitelist-list" id="whitelist-list">
            <div class="whitelist-empty">暂无白名单，添加常用安全网站可跳过检测</div>
          </div>
          <div class="whitelist-add">
            <input type="text" id="whitelist-input" class="settings-input"
                   placeholder="输入域名，如 github.com" autocomplete="off">
            <button class="action-btn btn-save" id="btn-add-whitelist">添加</button>
          </div>
          <button class="action-btn btn-add-current" id="btn-add-current">+ 添加当前页面域名</button>
          <button class="action-btn btn-clear" id="btn-clear-whitelist">清空白名单</button>
        </div>
      </details>
    </section>

    <!-- 情报源状态 -->
    <section class="source-status">
      <div class="section-title">情报源</div>
      <div id="source-list">
        <div class="source-item"><span class="source-name">加载中...</span></div>
      </div>
    </section>

    <!-- API Key 设置 -->
    <section class="settings">
      <details class="settings-details">
        <summary class="settings-summary">⚙️ 高级设置 / API Key</summary>
        <div class="settings-body">
          <label class="settings-label" for="key-virustotal">VirusTotal API Key</label>
          <input type="password" id="key-virustotal" class="settings-input"
                 placeholder="免费申请: virustotal.com/gui/my-apikey" autocomplete="off">
          <label class="settings-label" for="key-alienvault">AlienVault OTX Key</label>
          <input type="password" id="key-alienvault" class="settings-input"
                 placeholder="可选，留空用公开 API" autocomplete="off">
          <label class="settings-label" for="key-threatbook">微步 ThreatBook Key</label>
          <input type="password" id="key-threatbook" class="settings-input"
                 placeholder="可选，国内情报 x.threatbook.com" autocomplete="off">
          <label class="settings-label" for="key-pulsedive">Pulsedive API Key</label>
          <input type="password" id="key-pulsedive" class="settings-input"
                 placeholder="可选，综合情报 pulsedive.com" autocomplete="off">
          <p class="settings-hint">如使用代理，请将代理的出口 IP（非本机 IP）加入微步 IP 白名单。</p>
          <button class="action-btn btn-save" id="btn-save-keys">保存设置</button>
          <p class="settings-hint">VirusTotal / 微步 ThreatBook 免费 Key 限速，仅作为确认层参与拦截。</p>
        </div>
      </details>
    </section>


    <!-- 操作按钮 -->
    <section class="actions">
      <button class="action-btn btn-clear" id="btn-clear-stats">清除统计</button>
      <button class="action-btn btn-report" id="btn-report">举报可疑网站</button>
    </section>

    <!-- 页脚 -->
    <footer class="popup-footer">
      <span>情报源: VirusTotal · 微步 ThreatBook · Pulsedive · URLhaus · AlienVault OTX · 启发式</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
